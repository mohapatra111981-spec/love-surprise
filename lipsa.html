<!DOCTYPE html>
<html>
<head>
    <title>Lipsa - You are  My Forever Love 💖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            background: linear-gradient(-45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }
        
        /* Music Player */
        .music-player {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            opacity: 0;
            transition: all 0.5s;
        }
        .music-player.show { opacity: 1; }
        
        .music-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255,107,157,0.4);
            transition: all 0.3s;
        }
        .music-btn:hover { transform: scale(1.1); }
        
        /* Floating Elements */
        .stars, .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star, .heart-bg {
            position: absolute;
            animation: floatUp 6s infinite linear;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            z-index: 10;
            position: relative;
        }
        
        .lipsa-name {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 8vw, 7rem);
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: glowName 2s ease-in-out infinite alternate;
            text-shadow: 0 0 60px rgba(255,255,255,0.8);
        }
        
        .love-message {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: white;
            margin-bottom: 30px;
            font-weight: 300;
            max-width: 500px;
            line-height: 1.6;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        
        .magic-btn {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            padding: 18px 45px;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ff4757);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 35px rgba(255,107,157,0.4);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        
        .magic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        
        .magic-btn:hover::before { left: 100%; }
        .magic-btn:hover { 
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 25px 50px rgba(255,107,157,0.6);
        }
        
        /* Photo Frame */
        .photo-frame {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 300px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            transition: all 1s;
            z-index: 1000;
            background: #ff9a9e;
        }
        .photo-frame.show { transform: translate(-50%, -50%) scale(1); }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Surprise Messages */
        .surprise-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-family: 'Dancing Script', cursive;
            color: #ffd700;
            text-shadow: 0 0 30px #ff6b9d;
            opacity: 0;
            animation: bounceIn 1s forwards;
            z-index: 1001;
            pointer-events: none;
        }
        
        .explosion {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes glowName {
            from { filter: drop-shadow(0 0 20px #ff6b9d); }
            to { filter: drop-shadow(0 0 40px #c44569); }
        }
        
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        
        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        @keyframes explodeOut {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { 
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .photo-frame { width: 250px; height: 250px; }
            .surprise-msg { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- Music Player -->
    <div class="music-player" id="musicPlayer">
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">💖</button>
    </div>
    
    <!-- Background Effects -->
    <div class="stars" id="stars"></div>
    <div class="hearts-bg" id="heartsBg"></div>
    <div class="explosion" id="explosion"></div>
    
    <!-- Photo Frame - LIPSA KI PHOTO YAHAN DAALO -->
    <div class="photo-frame" id="photoFrame">
       <img id="slideshow" src="lipsa.jpg" alt="Lipsa 💕">
    </div>
    
    <!-- Main Content -->
    <div class="container">
        <h1 class="lipsa-name">Lipsa</h1>
        <div class="love-message">
            Tum meri zindagi ho, tum bina adhoori hai meri har khushi 💕<br>
            <strong>Tum Hi Ho...</strong> I Love You Forever & Always My Princess 👑
        </div>
        <button class="magic-btn" onclick="ultimateSurprise()">
            💖 Ultimate Surprise For Lipsa 💖
        </button>
    </div>

    <script>
        // Initialize effects
        createStars();
        createHeartBg();
        
        // 🎵 Akhiyaan Gulab - SHAHID KAPOOR (Ultimate Love Song) 💖
        const audio = new Audio('song.mp3');
        audio.loop = true;
        let isPlaying = false;
        
        // Stars
        function createStars() {
            const stars = document.getElementById('stars');
            for(let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 4 + 1) + 'px';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.innerHTML = '✨';
                stars.appendChild(star);
            }
        }
        
        // Background hearts
        function createHeartBg() {
            const heartsBg = document.getElementById('heartsBg');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = ['💖','💕','💗','💝','🌸','🌺'][Math.floor(Math.random()*6)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heartsBg.appendChild(heart);
                setTimeout(() => heart.remove(), 10000);
            }, 800);
        }
        
        // Music Toggle
        function toggleMusic() {
            if(isPlaying) {
                audio.pause();
                document.getElementById('musicBtn').textContent = '💖';
            } else {
                audio.play().catch(e => {
                    // Fallback romantic piano
                    audio.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAo';
                    audio.play();
                });
                document.getElementById('musicBtn').textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        }
        
        // Ultimate Surprise
        function ultimateSurprise() {
            // Photo Slideshow
            let photos = ["lipsa.jpg", "lipsa2.jpg", "lipsa3.jpg"];
            let currentPhoto = 0;

           function startSlideshow() {
                setInterval(() => {
                    currentPhoto = (currentPhoto + 1) % photos.length;
           document.getElementById("slideshow").src = photos[currentPhoto];
              }, 2000);
         }
            // Show music player
            document.getElementById('musicPlayer').classList.add('show');
            toggleMusic(); // Auto play music
            
            // Show photo
            document.getElementById('photoFrame').classList.add('show');
            startSlideshow();
            
            // Explosion
            const explosion = document.getElementById('explosion');
            explosion.style.opacity = '1';
            for(let i = 0; i < 300; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.style.cssText = `
                        position: absolute; width: 10px; height: 10px; border-radius: 50%;
                        left: 50%; top: 50%; background: ${['#ff6b9d','#ffd93d','#ff8e8e','#a8e6cf','#ff4757'][Math.floor(Math.random()*5)]};
                        transform: translate(-50%, -50%);
                        animation: explodeOut 3s infinite;
                    `;
                    const angle = (i / 300) * Math.PI * 2;
                    particle.style.setProperty('--dx', (Math.cos(angle) * 150) + 'px');
                    particle.style.setProperty('--dy', (Math.sin(angle) * 150) + 'px');
                    explosion.appendChild(particle);
                    setTimeout(() => particle.remove(), 3000);
                }, i * 10);
            }
            
            // Surprise messages sequence - TUM HI HO Special
            const messages = [
                'LIPSA I LOVE YOU! 💖',
                'My Forever Love! 😍',
                'TUM HI HO... 👑',
                'Hamesha Saath Rehna! 😍',
                'My Princess Forever! 💕',
                'Tum Bin Adhoora Hoon! ❤️'
            ];
            
            let msgIndex = 0;
            const msgInterval = setInterval(() => {
                const oldMsg = document.querySelector('.surprise-msg');
                if(oldMsg) oldMsg.remove();
                
                if(msgIndex < messages.length) {
                    const msg = document.createElement('div');
                    msg.className = 'surprise-msg';
                    msg.textContent = messages[msgIndex];
                    document.body.appendChild(msg);
                    msgIndex++;
                } else {
                    clearInterval(msgInterval);
                }
            }, 1500);
            
            // Reset after 15s
            setTimeout(() => {
                explosion.style.opacity = '0';
            }, 12000);
        }
    </script>
</body>
</html>
